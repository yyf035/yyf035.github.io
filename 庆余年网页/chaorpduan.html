<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翻转登录注册表单</title>
    <link rel="stylesheet" href="chaorpduan.css">
    <style>
        /* 修复多余a语法错误 */
        * {
            padding: 0;
            margin: 0;
            outline: none;
            box-sizing: border-box;
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        body {
            height: 100vh;
            /* 核心：页面垂直水平居中所有直接子元素 */
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0;
            /* 背景设置 */
            background: url("./img/a.jpg") no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
            font-family: sans-serif;
            position: relative;
        }
        /* 导航改为绝对定位悬浮，脱离文档流，不干扰flex居中 */
        .nav {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: inline-flex;
            overflow: hidden;
            background-color: rgb(66, 64, 64);
            padding: 0 10px;
            border-radius: 40px;
            box-shadow: 0 10px 20px rgba(159, 162, 177, .8);
            width: 800px;
            opacity: 0.6;
            z-index: 999;
        }
        .nav-item {
            color: #83818c;
            padding: 20px;
            text-decoration: none;
            transition: 0.3s;
            margin: 0 26px;
            z-index: 1;
            font-family: 'Roboto Condensed', sans-serif;
            font-weight: 700;
            position: relative;
            font-size: 18px;
        }
        .nav-item:before {
            content: "";
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 100%;
            height: 5px;
            background-color: #0e2050;
            border-radius: 8px 8px 0 0;
            opacity: 0;
            transition: 0.3s;
        }
        .nav-item:not(.is-active):hover:before {
            opacity: 1;
            bottom: 0;
        }
        .nav-item:not(.is-active):hover {
            color: #fff;
        }
        .nav-indicator {
            position: absolute;
            left: 0;
            bottom: 0;
            height: 5px;
            transition: 0.4s;
            z-index: 1;
            border-radius: 8px 8px 0 0;
            background-color: #0e2050;
        }
        /* 登录表单容器，纯居中，不受导航影响 */
        .shell{
            width: 300px;
            height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
            perspective: 1000px;
            /* 完全不受导航负边距干扰 */
        }
        .top{
            width: 300px;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            cursor: pointer;
        }
        .off,.on{
            color: #fff;
            transition: .5s;
            font-size: 20px;
        }
        .on{
            opacity: .5;
        }
        .button{
            width: 60px;
            height: 25px;
            background-color: rgb(255, 235, 167);
            border-radius: 20px;
            position: relative;
        }
        .ball{
            position: absolute;
            width: 25px;
            height: 25px;
            background-color: rgb(46, 45, 56);
            border-radius: 50%;
            transition: .5s ease;
            box-shadow: 0 0 10px #000;
            left: 0;
            top: 0;
        }
        .bottom{
            width: 300px;
            height: 250px;
            position: relative;
            transform-style: preserve-3d;
            transition: .7s ease;
            border-radius: 5px;
        }
        .signIn, .signUp{
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly;
            background: url(./background.png) no-repeat center/cover;
            backface-visibility: hidden;
        }
        .signIn{
            transform: rotateY(0deg);
        }
        .signUp{
            transform: rotateY(180deg);
        }
        .bottom h2{
            color: #fff;
        }
        .bottom input{
            width: 200px;
            height: 32px;
            padding: 0 10px;
            background-color: rgba(31, 32, 41, 0.8);
            color: #fff;
            border: 1px solid #666;
            border-radius: 4px;
        }
        .bottom button{
            width: 80px;
            height: 30px;
            color: #333;
            font-size: 15px;
            background-color: rgb(255, 235, 167);
            border-radius: 4px;
            transition: .3s;
            cursor: pointer;
        }
        .bottom button:hover{
            box-shadow: 0 0 10px rgb(255, 235, 167);
        }
    </style>
</head>
<body>
    <!-- 导航放到body直接子级，绝对定位悬浮顶部，不影响居中 -->
    <nav class="nav">
        <a href="index.html" class="nav-item">首页</a>
        <a href="jieshao.html" class="nav-item">介绍</a>
        <a href="zhanjiejs.html" class="nav-item">章节介绍</a>
        <a href="renwujs.html" class="nav-item">人物介绍</a>
        <a href="chaorpduan.html" class="nav-item is-active">登录</a>
        <span class="nav-indicator"></span>
    </nav>

    <!-- 登录表单容器：body flex会自动把它放在页面正中间 -->
    <div class="shell">
        <div class="top">
            <span class="off">SIGN IN</span>
            <div class="button">
                <div class="ball"></div>
            </div>
            <span class="on">SIGN UP</span>
        </div>
        <div class="bottom">
            <div class="signIn">
                <h2>Sign in</h2>
                <input type="text" placeholder="Username">
                <input type="password" placeholder="Password">
                <button>GO</button>
            </div>
            <div class="signUp">
                <h2>Sign Up</h2>
                <input type="text" placeholder="Username">
                <input type="password" placeholder="Password">
                <input type="password" placeholder="Confirm Password">
                <button>GO</button>
            </div>
        </div>
    </div>

    <script>
        const button = document.querySelector('.button')
        const ball = document.querySelector('.ball')
        const bottom = document.querySelector('.bottom')
        const signInText = document.querySelector('.off')
        const signUpText = document.querySelector('.on')
        let isLogin = true

        button.addEventListener('click', () => {
            if(isLogin){
                isLogin = false
                ball.style.left = '35px'
                bottom.style.transform = 'rotateY(180deg)'
                signInText.style.opacity = 0.5
                signUpText.style.opacity = 1
            }else{
                isLogin = true
                ball.style.left = '0px'
                bottom.style.transform = 'rotateY(0deg)'
                signInText.style.opacity = 1
                signUpText.style.opacity = 0.5
            }
        })
        // 导航指示器自动匹配当前激活菜单
        const navItems = document.querySelectorAll('.nav-item');
        const indicator = document.querySelector('.nav-indicator');
        function setIndicator(item) {
          indicator.style.width = `${item.offsetWidth}px`;
          indicator.style.left = `${item.offsetLeft}px`;
        }
        const activeItem = document.querySelector('.nav-item.is-active');
        setIndicator(activeItem);
        navItems.forEach(item => {
          item.addEventListener('click', () => setIndicator(item));
        })
    </script>
</body>
</html>
